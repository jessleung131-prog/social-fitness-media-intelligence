    staging:
      +materialized: view
      +schema: staging
    marts:
      +materialized: table
      +schema: social_fitness
    reports:
      +materialized: view
      +schema: social_fitness

vars:
  start_date: '2024-10-01'
  end_date:   '2025-03-31'
